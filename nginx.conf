server {
  listen 80;
  server_name www.robotronics.ai;

  return 308 https://robotronics.ai$request_uri;
}

server {
  listen 80 default_server;
  server_name robotronics.ai _;
  root /usr/share/nginx/html;
  index index.html;

  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  location = /index.html {
    add_header Cache-Control "no-cache";
    try_files /index.html =404;
  }

  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  location / {
    add_header Cache-Control "no-cache";
    try_files $uri $uri/ /index.html;
  }
}
